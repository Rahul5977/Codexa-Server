services:
  postgres:
    image: postgres:15-alpine
    container_name: codexa-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: codexa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d codexa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codexa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: codexa-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: auth-service/DockerFile
      target: ${BUILD_TARGET:-development}
    container_name: codexa-auth-service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=${NODE_ENV:-development}
      - KAFKA_BROKERS=kafka:9092
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - FILE_UPLOAD_SERVICE_URL=http://utils-service:8001
    volumes:
      - ./auth-service:/app/auth-service
      - ./db-service:/app/db-service
      - /app/db-service/dist
      - /app/db-service/node_modules
      - /app/node_modules
      - /app/auth-service/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  utils-service:
    build:
      context: .
      dockerfile: utils-service/DockerFile
      target: ${BUILD_TARGET:-development}
    container_name: codexa-utils-service
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=${NODE_ENV:-development}
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_GROUP_ID=utils-service-group
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    volumes:
      - ./utils-service:/app/utils-service
      - ./db-service:/app/db-service
      - /app/db-service/dist
      - /app/db-service/node_modules
      - /app/node_modules
      - /app/utils-service/node_modules
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  problem-service:
    build:
      context: .
      dockerfile: problem-service/DockerFile
      target: ${BUILD_TARGET:-development}
    container_name: codexa-problem-service
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=${NODE_ENV:-development}
      - KAFKA_BROKERS=kafka:9092
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    volumes:
      - ./problem-service:/app/problem-service
      - ./db-service:/app/db-service
      - /app/db-service/dist
      - /app/db-service/node_modules
      - /app/node_modules
      - /app/problem-service/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  classroom-service:
    build:
      context: .
      dockerfile: classroom-service/DockerFile
      target: ${BUILD_TARGET:-development}
    container_name: codexa-classroom-service
    ports:
      - "8005:8005"
    environment:
      - PORT=8005
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=${NODE_ENV:-development}
      - KAFKA_BROKERS=kafka:9092
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    volumes:
      - ./classroom-service:/app/classroom-service
      - ./db-service:/app/db-service
      - /app/db-service/dist
      - /app/db-service/node_modules
      - /app/node_modules
      - /app/classroom-service/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  code-service:
    build:
      context: .
      dockerfile: code-service/Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: codexa-code-service
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=${NODE_ENV:-development}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JUDGE0_URL=${JUDGE0_URL:-http://judge0-v1131-server-1:2358}
      - KAFKA_BROKERS=kafka:9092
    volumes:
      - ./code-service:/app/code-service
      - ./db-service:/app/db-service
      - /app/db-service/dist
      - /app/db-service/node_modules
      - /app/node_modules
      - /app/code-service/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - judge0-network
    restart: unless-stopped

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: codexa-analytics-service
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=${NODE_ENV:-development}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:9092
      - CORS_ORIGIN=${CORS_ORIGIN}
    volumes:
      - ./analytics-service:/app/analytics-service
      - ./db-service:/app/db-service
      - /app/db-service/dist
      - /app/db-service/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
  judge0-network:
    external: true
    name: judge0-v1131_default

volumes:
  postgres_data:
  redis_data:
