services:
  postgres:
    image: postgres:15-alpine
    container_name: codexa-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: codexa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: codexa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  kafka:
    image: apache/kafka:3.7.0
    container_name: codexa-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    restart: always

  auth-service:
    build:
      context: .
      dockerfile: auth-service/DockerFile
      target: production
    container_name: codexa-auth-service
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
      - KAFKA_BROKERS=kafka:9092
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - FILE_UPLOAD_SERVICE_URL=http://utils-service:3001
    depends_on:
      - postgres
      - kafka
    restart: always

  utils-service:
    build:
      context: .
      dockerfile: utils-service/DockerFile
      target: production
    container_name: codexa-utils-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_GROUP_ID=utils-service-group
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      - kafka
    restart: always

  problem-service:
    build:
      context: .
      dockerfile: problem-service/DockerFile
      target: production
    container_name: codexa-problem-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
      - KAFKA_BROKERS=kafka:9092
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      - postgres
      - kafka
    restart: always

  classroom-service:
    build:
      context: .
      dockerfile: classroom-service/DockerFile
      target: production
    container_name: codexa-classroom-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
      - KAFKA_BROKERS=kafka:9092
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      - postgres
      - kafka
    restart: always

  code-service:
    build:
      context: .
      dockerfile: code-service/Dockerfile
      target: production
    container_name: codexa-code-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JUDGE0_API_URL=${JUDGE0_API_URL}
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - redis
    restart: always

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
      target: production
    container_name: codexa-analytics-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      - postgres
      - redis
    restart: always

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
      target: production
    container_name: codexa-ai-service
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      - postgres
    restart: always

  ai-analytics-service:
    build:
      context: .
      dockerfile: ai-analytics-service/Dockerfile
      target: production
    container_name: codexa-ai-analytics-service
    ports:
      - "8006:8006"
    environment:
      - PORT=8006
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      - postgres
      - redis
    restart: always

  codexa-client:
    build:
      context: ../Codexa-Client
      dockerfile: Dockerfile
      target: production
    container_name: codexa-client
    ports:
      - "4173:4173"
    env_file:
      - ../Codexa-Client/.env
    depends_on:
      - auth-service
      - problem-service
      - code-service
      - analytics-service
      - ai-analytics-service
    restart: always

volumes:
  postgres_data:
  redis_data:
